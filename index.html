<!doctype html>
<html lang="en">
  <head>
    <title>CPSC 487/587 Final Project</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.3.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quaternion@1.5.1/quaternion.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/numeric@1.2.6/numeric-1.2.6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/": "https://unpkg.com/three@0.160.0/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import {
        ThreeEngine,
        get_default_lil_gui,
      } from "./js/utils/utils_three.js";
      import * as THREE from "three";

      let engine = ThreeEngine.new_default_3d(0, 0, 20);
      let gui = get_default_lil_gui();

      const waypoints = [];
      let splineT = 0;
      let spline = null;
      let splineLength = 0;

      const params = {
        x: 0,
        y: 0,
        speed: 1.5,
        swayAmp: 0.18,
        swayFreq: 3.0,
        wLength: 1.0,
        wSmooth: 4.0,
        wObstacle: 8.0,
        safeDist: 1.5,
      };
      let waypointFolder = gui.addFolder("Waypoint Controls");
      let swayFolder = gui.addFolder("Sway Controls");

      waypointFolder.add(params, "x", -10, 10).name("Target X");
      waypointFolder.add(params, "y", -10, 10).name("Target Y");
      waypointFolder
        .add(
          {
            add: () => {
              waypoints.push(new THREE.Vector3(params.x, params.y, 0));
            },
          },
          "add",
        )
        .name("Add Waypoint");
      waypointFolder
        .add(
          {
            clear: () => {
              waypoints.length = 0;
              spline = null;
              moving = false;
              splineT = 0;
            },
          },
          "clear",
        )
        .name("Clear Waypoints");

      let moving = false;

      swayFolder.add(params, "speed", 0.5, 5.0).name("Speed");
      swayFolder.add(params, "swayAmp", 0, 0.5).name("Sway Amount");
      swayFolder.add(params, "swayFreq", 1, 8).name("Sway Speed");

      const obstacles = [
        { center: new THREE.Vector3(2, 3, 0), radius: 1.5 },
        { center: new THREE.Vector3(-3, 1, 0), radius: 1 },
        { center: new THREE.Vector3(4, -2, 0), radius: 2 },
      ];

      const obsParams = { x: 0, y: 0, radius: 0.8 };
      let obstacleFolder = gui.addFolder("Obstacles");
      obstacleFolder.add(obsParams, "x", -10, 10).name("X");
      obstacleFolder.add(obsParams, "y", -10, 10).name("Y");
      obstacleFolder.add(obsParams, "radius", 0.2, 2.0).name("Radius");
      obstacleFolder
        .add(
          {
            place: () => {
              obstacles.push({
                center: new THREE.Vector3(obsParams.x, obsParams.y, 0),
                radius: obsParams.radius,
              });
            },
          },
          "place",
        )
        .name("Place Obstacle");
      obstacleFolder
        .add(
          {
            clearObs: () => {
              obstacles.length = 0;
            },
          },
          "clearObs",
        )
        .name("Clear Obstacles");

      let weightFolder = gui.addFolder("Optimizer Weights");
      weightFolder.add(params, "wLength", 0.0, 5.0).name("Path Length Weight");
      weightFolder.add(params, "wSmooth", 0.0, 10.0).name("Smoothness Weight");
      weightFolder.add(params, "wObstacle", 0.0, 20.0).name("Obstacle Weight");
      weightFolder.add(params, "safeDist", 0.5, 3.0).name("Safety Distance");

      gui
        .add(
          {
            go: () => {
              if (waypoints.length < 1) return;
              const all_waypoints = [
                new THREE.Vector3(joints[0].x, joints[0].y, 0),
                ...waypoints,
              ];

              let optimizedPath = [];

              for (let i = 0; i < all_waypoints.length - 1; i++) {
                const segmentPath = optimizePath(
                  all_waypoints[i],
                  all_waypoints[i + 1],
                  obstacles,
                  12,
                  200,
                );

                if (i > 0) segmentPath.shift();

                optimizedPath.push(...segmentPath);
              }

              spline = new THREE.CatmullRomCurve3(optimizedPath);
              spline.arcLengthDivisions = 200;
              splineT = 0;
              moving = true;
              splineLength = spline.getLength();
            },
          },
          "go",
        )
        .name("Go!");

      function optimizePath(
        start,
        goal,
        obstacles,
        numPoints = 12,
        iterations = 200,
      ) {
        const points = [];

        for (let i = 0; i < numPoints; i++) {
          const t = i / (numPoints - 1);
          points.push(start.clone().lerp(goal, t));
        }

        const lr = 0.02;

        for (let iter = 0; iter < iterations; iter++) {
          const gradients = points.map(() => new THREE.Vector3(0, 0, 0));

          for (let i = 1; i < numPoints - 1; i++) {
            const prev = points[i - 1];
            const curr = points[i];
            const next = points[i + 1];

            const lengthGrad = curr
              .clone()
              .multiplyScalar(2)
              .sub(prev)
              .sub(next)
              .multiplyScalar(params.wLength);

            gradients[i].add(lengthGrad);

            const midpoint = prev.clone().add(next).multiplyScalar(0.5);
            const smoothGrad = curr
              .clone()
              .sub(midpoint)
              .multiplyScalar(params.wSmooth);

            gradients[i].add(smoothGrad);

            obstacles.forEach((obs) => {
              const diff = curr.clone().sub(obs.center);
              const dist = diff.length();
              const minDist = obs.radius + params.safeDist;

              if (dist < minDist) {
                if (dist < 0.0001) diff.set(1, 0, 0);

                const direction = diff.normalize();
                const violation = minDist - dist;

                const obstacleGrad = direction.multiplyScalar(
                  -2 * params.wObstacle * violation,
                );

                gradients[i].add(obstacleGrad);
              }
            });
          }

          for (let i = 1; i < numPoints - 1; i++) {
            points[i].sub(gradients[i].multiplyScalar(lr));
          }
        }

        return points;
      }

      const SEGMENTS = 20;
      const LENGTH = 0.25;
      const clock = new THREE.Clock();

      const joints = [];
      for (let i = 0; i < SEGMENTS; i++) {
        joints.push(new THREE.Vector3(0, -i * LENGTH, 0));
      }

      const radii = [];
      for (let i = 0; i < SEGMENTS; i++) {
        const radius = THREE.MathUtils.lerp(0.32, 0.16, i / (SEGMENTS - 1));
        radii.push(radius);
      }

      const stillHeadColor = new THREE.Color(0x2ecc40);
      const stillTailColor = new THREE.Color(0x1a5e20);

      const colors = [];
      for (let i = 0; i < SEGMENTS; i++) {
        const color = new THREE.Color().lerpColors(
          stillHeadColor,
          stillTailColor,
          i / (SEGMENTS - 1),
        );
        colors.push(color);
      }

      engine.animation_loop(() => {
        const delta = clock.getDelta();
        const t = clock.getElapsedTime();

        if (spline && moving) {
          splineT += (params.speed * delta) / splineLength;
          splineT = Math.min(splineT, 1);

          const targetOnSpline = spline.getPointAt(splineT);
          joints[0].lerp(targetOnSpline, 0.3);

          const points = spline.getPoints(50);
          for (let i = 0; i < points.length - 1; i++) {
            const a = points[i];
            const b = points[i + 1];
            engine.draw_debug_line(
              [a.x, a.y, a.z],
              [b.x, b.y, b.z],
              false,
              0.05,
              0xffa500,
            );
          }

          if (splineT >= 1) {
            moving = false;
            waypoints.length = 0;
            spline = null;
          }
        }

        for (let i = 1; i < SEGMENTS; i++) {
          const dir = new THREE.Vector3()
            .subVectors(joints[i], joints[i - 1])
            .normalize();
          joints[i].copy(joints[i - 1]).addScaledVector(dir, LENGTH);
        }

        const headDir = new THREE.Vector3()
          .subVectors(joints[0], joints[1])
          .normalize();

        const perp = new THREE.Vector3(-headDir.y, headDir.x, 0);

        joints.forEach((p, i) => {
          const sway = params.swayAmp * Math.sin(t * params.swayFreq + i * 0.6);
          const swayedPos = p.clone().addScaledVector(perp, sway);

          let color = null;

          if (!moving) {
            color = new THREE.Color().lerpColors(
              stillHeadColor,
              stillTailColor,
              i / (SEGMENTS - 1),
            );
          } else {
            const bodyFraction = i / (SEGMENTS - 1);
            const timeShift = t * 0.2;
            const hue = (bodyFraction + timeShift) % 1.0;

            color = new THREE.Color().setHSL(hue, 1.0, 0.5);
          }

          engine.draw_debug_sphere(
            [swayedPos.x, swayedPos.y, swayedPos.z],
            radii[i],
            color.getHex(),
            1.0,
          );
        });

        waypoints.forEach((wp, i) => {
          engine.draw_debug_sphere([wp.x, wp.y, wp.z], 0.12, 0xff0000, 1.0);
        });

        engine.draw_debug_sphere([params.x, params.y, 0], 0.12, 0x000000, 1.0);
        engine.draw_debug_sphere(
          [obsParams.x, obsParams.y, 0],
          0.12,
          0x800080,
          1.0,
        );

        obstacles.forEach((obs) => {
          engine.draw_debug_sphere(
            [obs.center.x, obs.center.y, obs.center.z],
            obs.radius,
            0x800080,
            1.0,
          );
        });
      });
    </script>
  </body>
</html>
