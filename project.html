<!doctype html>
<html lang="en">
  <head>
    <title>CPSC 487/587</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.1/dist/lil-gui.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/10.3.0/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quaternion@1.5.1/quaternion.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/numeric@1.2.6/numeric-1.2.6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stats.js@0.17.0/build/stats.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/": "https://unpkg.com/three@0.160.0/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import {
        ThreeEngine,
        get_default_lil_gui,
      } from "./js/utils/utils_three.js";
      import * as THREE from "three";

      let engine = ThreeEngine.new_default_3d(0, 0, 20);
      let gui = get_default_lil_gui();

      const waypoints = [];
      let splineT = 0;
      let spline = null;
      let splineLength = 0;

      const params = { x: 0, y: 0, speed: 1.5, swayAmp: 0.18, swayFreq: 3.0 };
      let waypointFolder = gui.addFolder("Waypoint Controls");
      let swayFolder = gui.addFolder("Sway Controls");

      waypointFolder.add(params, "x", -10, 10).name("Target X");
      waypointFolder.add(params, "y", -10, 10).name("Target Y");
      waypointFolder
        .add(
          {
            add: () => {
              waypoints.push(new THREE.Vector3(params.x, params.y, 0));
            },
          },
          "add",
        )
        .name("Add Waypoint");
      waypointFolder
        .add(
          {
            clear: () => {
              waypoints.length = 0;
              spline = null;
              moving = false;
              splineT = 0;
            },
          },
          "clear",
        )
        .name("Clear Waypoints");

      let moving = false;

      gui
        .add(
          {
            go: () => {
              if (waypoints.length < 1) return;
              const all_waypoints = [
                new THREE.Vector3(joints[0].x, joints[0].y, 0),
                ...waypoints,
              ];

              const new_path = buildPath(all_waypoints, obstacles);

              spline = new THREE.CatmullRomCurve3(new_path);
              spline.arcLengthDivisions = 200;
              splineT = 0;
              moving = true;
              splineLength = spline.getLength();
            },
          },
          "go",
        )
        .name("Go!");

      swayFolder.add(params, "speed", 0.5, 5.0).name("Speed");
      swayFolder.add(params, "swayAmp", 0, 0.5).name("Sway Amount");
      swayFolder.add(params, "swayFreq", 1, 8).name("Sway Speed");

      const obstacles = [
        { center: new THREE.Vector3(2, 3, 0), radius: 1.5 },
        { center: new THREE.Vector3(-3, 1, 0), radius: 1 },
        { center: new THREE.Vector3(4, -2, 0), radius: 2 },
      ];

      const obsParams = { x: 0, y: 0, radius: 0.8 };
      let obstacleFolder = gui.addFolder("Obstacles");
      obstacleFolder.add(obsParams, "x", -10, 10).name("X");
      obstacleFolder.add(obsParams, "y", -10, 10).name("Y");
      obstacleFolder.add(obsParams, "radius", 0.2, 2.0).name("Radius");
      obstacleFolder
        .add(
          {
            place: () => {
              obstacles.push({
                center: new THREE.Vector3(obsParams.x, obsParams.y, 0),
                radius: obsParams.radius,
              });
            },
          },
          "place",
        )
        .name("Place Obstacle");
      obstacleFolder
        .add(
          {
            clearObs: () => {
              obstacles.length = 0;
            },
          },
          "clearObs",
        )
        .name("Clear Obstacles");

      const PADDING = 1.5;

      function getDetourPoints(
        waypoint1,
        waypoint2,
        obstacles,
        maxIterations = 25,
      ) {
        const detours = [];

        obstacles.forEach((obs) => {
          const AB = new THREE.Vector3().subVectors(waypoint2, waypoint1);
          const AC = new THREE.Vector3().subVectors(obs.center, waypoint1);
          const t = Math.max(0, Math.min(1, AC.dot(AB) / AB.dot(AB)));
          const closest = waypoint1.clone().addScaledVector(AB, t);

          if (closest.distanceTo(obs.center) < obs.radius + PADDING) {
            const away = new THREE.Vector3().subVectors(closest, obs.center);
            if (away.length() < 0.0001) away.set(1, 0, 0);
            away.normalize().multiplyScalar(obs.radius + PADDING);

            let detourPoint = obs.center.clone().add(away);

            for (let iter = 0; iter < maxIterations; iter++) {
              let clean = true;
              obstacles.forEach((other) => {
                if (
                  detourPoint.distanceTo(other.center) <
                  other.radius + PADDING
                ) {
                  const pushAway = new THREE.Vector3().subVectors(
                    detourPoint,
                    other.center,
                  );
                  if (pushAway.length() < 0.0001) pushAway.set(1, 0, 0);
                  pushAway.normalize().multiplyScalar(other.radius + PADDING);
                  detourPoint = other.center.clone().add(pushAway);
                  clean = false;
                }
              });
              if (clean) break;
            }

            detours.push({ t, point: detourPoint });
          }
        });

        detours.sort((a, b) => a.t - b.t);
        return detours.map((d) => d.point);
      }

      function buildPath(waypoints, obstacles) {
        const result = [];

        for (let i = 0; i < waypoints.length - 1; i++) {
          result.push(waypoints[i]);
          const detours = getDetourPoints(
            waypoints[i],
            waypoints[i + 1],
            obstacles,
          );
          detours.forEach((d) => result.push(d));
        }

        result.push(waypoints[waypoints.length - 1]);

        return result;
      }

      const SEGMENTS = 20;
      const LENGTH = 0.25;
      const clock = new THREE.Clock();

      const joints = [];
      for (let i = 0; i < SEGMENTS; i++) {
        joints.push(new THREE.Vector3(0, -i * LENGTH, 0));
      }

      const radii = [];
      for (let i = 0; i < SEGMENTS; i++) {
        const radius = THREE.MathUtils.lerp(0.32, 0.16, i / (SEGMENTS - 1));
        radii.push(radius);
      }

      const headColor = new THREE.Color(0x2ecc40);
      const tailColor = new THREE.Color(0x1a5e20);

      const colors = [];
      for (let i = 0; i < SEGMENTS; i++) {
        const color = new THREE.Color().lerpColors(
          headColor,
          tailColor,
          i / (SEGMENTS - 1),
        );
        colors.push(color);
      }

      engine.animation_loop(() => {
        const delta = clock.getDelta();
        const t = clock.getElapsedTime();

        if (spline && moving) {
          splineT += (params.speed * delta) / splineLength;
          splineT = Math.min(splineT, 1);

          const targetOnSpline = spline.getPointAt(splineT);
          joints[0].lerp(targetOnSpline, 0.3);

          const points = spline.getPoints(50);
          for (let i = 0; i < points.length - 1; i++) {
            const a = points[i];
            const b = points[i + 1];
            engine.draw_debug_line(
              [a.x, a.y, a.z],
              [b.x, b.y, b.z],
              false,
              0.05,
              0xffa500,
            );
          }

          if (splineT >= 1) {
            moving = false;
            waypoints.length = 0;
            spline = null;
          }
        }

        for (let i = 1; i < SEGMENTS; i++) {
          const dir = new THREE.Vector3()
            .subVectors(joints[i], joints[i - 1])
            .normalize();
          joints[i].copy(joints[i - 1]).addScaledVector(dir, LENGTH);
        }

        const headDir = new THREE.Vector3()
          .subVectors(joints[0], joints[1])
          .normalize();

        const perp = new THREE.Vector3(-headDir.y, headDir.x, 0);

        joints.forEach((p, i) => {
          const sway = params.swayAmp * Math.sin(t * params.swayFreq + i * 0.6);
          const swayedPos = p.clone().addScaledVector(perp, sway);

          engine.draw_debug_sphere(
            [swayedPos.x, swayedPos.y, swayedPos.z],
            radii[i],
            colors[i].getHex(),
            1.0,
          );
        });

        waypoints.forEach((wp, i) => {
          engine.draw_debug_sphere([wp.x, wp.y, wp.z], 0.12, 0xff0000, 1.0);
        });

        engine.draw_debug_sphere([params.x, params.y, 0], 0.12, 0x000000, 1.0);
        engine.draw_debug_sphere(
          [obsParams.x, obsParams.y, 0],
          0.12,
          0x800080,
          1.0,
        );

        obstacles.forEach((obs) => {
          engine.draw_debug_sphere(
            [obs.center.x, obs.center.y, obs.center.z],
            obs.radius,
            0x800080,
            1.0,
          );
        });
      });
    </script>
  </body>
</html>
